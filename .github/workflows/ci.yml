name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - name: smoke test — typerion init
        run: |
          ./packages/cli/bin/typerion.mjs init /tmp/typerion-smoke
          test -f /tmp/typerion-smoke/typerion.json
          test -f /tmp/typerion-smoke/main.tp
